[tool.poetry]
name = "pudgeland"
version = "0.1.0"
description = "🔥 Pudgeland"
license = "MIT"
authors = ["elaresai <elaresai@gmail.com>"]
maintainers = ["elaresai <elaresai@gmail.com>"]
readme = "README.md"
homepage = "https://github.com/elaresai/pudgeland"
repository = "https://github.com/elaresai/pudgeland"
classifiers = [
    "License :: OSI Approved :: MIT License",

    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.8",
]

[tool.poetry.dependencies]
python = ">=3.8.1,<3.12"
pre-commit = "^3.3.3"
ruff = "^0.0.277"
hikari = "^2.0.0.dev120"
hikari-crescent = "^0.6.2"
attrs = "^23.1.0"
mcstatus = "^11.0.0"
python-dotenv = "^1.0.0"
collei = "^1.0.1"
replit = "^3.3.0"
msgspec = "^0.16.0"
meowy = "^1.0.0"
woofy = "^1.0.0"
black = "^23.7.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
